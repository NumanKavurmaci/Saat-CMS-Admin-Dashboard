name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SAATCMS_API_BASE_URL: https://backend-developer-take-home-assignment.onrender.com
      CMS_API_KEYS: ci-reviewer:editor:ci-placeholder-secret-at-least-32-characters
      DASHBOARD_SESSION_SECRET: ci-session-secret-placeholder-at-least-32-characters
      SAATCMS_REQUEST_TIMEOUT_MS: "30000"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build production bundle
        run: npm run build
